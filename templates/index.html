<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SaveView</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div id="loadingOverlay" class="loading-overlay">
      <div class="spinner" aria-hidden="true"></div>
      <p id="loadingStatus">Starter app …</p>
    </div>

    <main class="container">
      <header>
        <h1>Opsparing</h1>
        <p id="sourceLabel"></p>
      </header>

      <section id="warningBox" class="warning hidden"></section>

      <section class="card">
        <h2>Opsparing pr. kategori</h2>
        <p id="totalBalance" class="total-balance">Total saldo: 0,00 kr.</p>
        <ul id="categoryList"></ul>
      </section>

      <section class="card">
        <h2>Total saldo over tid</h2>
        <div class="range-controls">
          <button type="button" data-range="week">Seneste uge</button>
          <button type="button" data-range="month">Seneste måned</button>
          <button type="button" data-range="quarter">Seneste 3 måneder</button>
        </div>
        <canvas id="saldoCanvas" width="600" height="260"></canvas>
      </section>

      <section class="card">
        <h2>Udvikling pr. kategori</h2>
        <div class="range-controls">
          <button type="button" data-range="week">Seneste uge</button>
          <button type="button" data-range="month">Seneste måned</button>
          <button type="button" data-range="quarter">Seneste 3 måneder</button>
        </div>
        <canvas id="categoryCanvas" width="600" height="300"></canvas>
        <div id="categoryLegend" class="chart-legend"></div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
